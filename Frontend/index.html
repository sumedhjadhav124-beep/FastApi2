<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>👥 User Dashboard</h1>
                <p class="meta">Manage all registered users in one place</p>
            </div>
            <div class="header-actions">
                <a href="/blog" class="btn btn-muted">📝 Blog</a>
                <a href="/create" class="btn btn-blue">+ Add User</a>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th style="width: 10%;">ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th style="width: 20%;">Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for user in users %}
                <tr>
                    <td><strong>#{{ user.id }}</strong></td>
                    <td>{{ user.name }}</td>
                    <td>{{ user.email }}</td>
                    <td>
                        <a href="/update/{{ user.id }}" class="btn btn-green btn-sm">Edit</a>
                        <a href="/delete/{{ user.id }}" class="btn btn-red btn-sm" onclick="return confirm('Are you sure you want to delete this user?');">Delete</a>
                    </td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="4" style="text-align: center; padding: 60px;">
                        <strong style="font-size: 1.1rem;">No users found</strong><br>
                        <a href="/create" style="color: #667eea; text-decoration: underline; font-weight: 600; margin-top: 12px; display: inline-block;">Create one now!</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
