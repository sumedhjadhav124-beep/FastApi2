<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Delete User</title>
    <style>
        body { font-family: sans-serif; background-color: #f3f4f6; display: flex; justify-content: center; padding-top: 100px; text-align: center; }
        .card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 350px; }
        .btn { padding: 10px 20px; color: white; border: none; border-radius: 5px; cursor: pointer; margin: 10px; text-decoration: none;}
        .btn-red { background-color: #ef4444; }
        .btn-gray { background-color: #9ca3af; color: white;}
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color: #ef4444;">Warning</h2>
        <p>Are you sure you want to permanently delete this user?</p>
        <div style="margin-top: 20px;">
            <a href="index.html" class="btn btn-gray">Cancel</a>
            <button id="deleteBtn" class="btn btn-red">Yes, Delete</button>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('id');

        document.getElementById('deleteBtn').addEventListener('click', function() {
            fetch(`http://127.0.0.1:8000/users/${userId}`, {
                method: 'DELETE'
            }).then(() => {
                window.location.href = 'index.html';
            });
        });
    </script>
</body>
</html>
