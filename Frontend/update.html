<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Update User</title>
    <style>
        body { font-family: sans-serif; background-color: #f3f4f6; display: flex; justify-content: center; padding-top: 100px; }
        .card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        .btn { width: 100%; padding: 10px; background-color: #10b981; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Update User</h2>
        <form action="/update/{{ user.id }}" method="post">
            <input type="text" name="name" value="{{ user.name }}" required>
            <input type="email" name="email" value="{{ user.email }}" required>
            <button type="submit" class="btn">Update User</button>
        </form>
        <br><a href="/" style="font-size: 14px; color: #666; text-decoration: none;">&larr; Cancel</a>
    </div>
</body>
</html>
